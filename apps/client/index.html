<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>White Exile</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: dark;
        --hud-fg: #e8eaff;
        --hud-bg: rgba(8, 10, 28, 0.66);
        --hud-border: rgba(120, 140, 220, 0.35);
        --hud-shadow: 0 0 18px rgba(80, 100, 220, 0.25);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        color: var(--hud-fg);
        font-family:
          'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
        overflow: hidden;
      }
      #scene {
        position: fixed;
        inset: 0;
        outline: none;
      }
      #scene:focus {
        box-shadow: inset 0 0 0 1px rgba(120, 160, 255, 0.25);
      }
      .hud {
        position: fixed;
        z-index: 10;
        padding: 10px 14px;
        background: var(--hud-bg);
        border: 1px solid var(--hud-border);
        border-radius: 10px;
        box-shadow: var(--hud-shadow);
        backdrop-filter: blur(6px);
        font-size: 13px;
        line-height: 1.5;
        pointer-events: none;
      }
      .hud--top-left {
        top: 12px;
        left: 12px;
        min-width: 240px;
      }
      .hud--top-right {
        top: 12px;
        right: 12px;
        text-align: right;
      }
      .hud strong {
        color: #ffe6a4;
        font-weight: 600;
      }
      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
        background: #f55;
        box-shadow: 0 0 6px currentColor;
      }
      .status-dot.connected {
        background: #6cf6a3;
      }
      .status-dot.connecting {
        background: #ffe070;
      }
      .fuel-meter {
        position: relative;
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 3px;
        overflow: hidden;
        margin-top: 4px;
      }
      .fuel-fill {
        position: absolute;
        inset: 0 auto 0 0;
        height: 100%;
        background: #6cf6a3;
        transition: width 120ms linear, background 240ms;
      }
      .zone-tag {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 999px;
        background: rgba(120, 140, 220, 0.18);
        border: 1px solid rgba(120, 140, 220, 0.35);
        font-size: 11px;
      }
      .scene-tooltip {
        box-sizing: border-box;
        max-width: min(28rem, 88vw);
        padding: 6px 10px;
        border-radius: 6px;
        background: rgba(6, 8, 18, 0.88);
        border: 1px solid rgba(140, 160, 230, 0.45);
        color: #e4e8ff;
        font: 12px/1.45 system-ui, sans-serif;
        white-space: pre-line;
        text-align: left;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
    </style>
  </head>
  <body>
    <canvas
      id="scene"
      tabindex="0"
      aria-label="White Exile game view"
    ></canvas>
    <div class="hud hud--top-left" id="hud-stats">
      <div><span id="hud-status-dot" class="status-dot"></span><span id="hud-status">connecting...</span></div>
      <div>Note <strong id="hud-room-note">—</strong></div>
      <div>Players <strong id="hud-players">0</strong> · tick <strong id="hud-tick">0</strong></div>
      <div>Race <strong id="hud-race">emberfolk</strong> · Zone <span class="zone-tag" id="hud-zone">Safe Ashlands</span></div>
      <div>Light <strong id="hud-light">0.0</strong> · Caravan <strong id="hud-caravan">1</strong></div>
      <div>Followers <strong id="hud-followers">0</strong></div>
      <div>Fuel <strong id="hud-fuel-text">100%</strong>
        <div class="fuel-meter"><div class="fuel-fill" id="hud-fuel-bar" style="width:100%"></div></div>
      </div>
    </div>
    <div class="hud hud--top-right" id="hud-name">
      <div>You: <strong id="hud-display-name">guest</strong></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
